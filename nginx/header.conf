# ── Sécurité de base ──────────────────────────────────────────────
add_header X-Content-Type-Options      "nosniff"     always;
add_header X-XSS-Protection            "1; mode=block" always;
add_header X-Frame-Options             "SAMEORIGIN"  always;
add_header X-Download-Options          "noopen"      always;
add_header X-Permitted-Cross-Domain-Policies "master-only" always;

# ── HSTS — à activer UNIQUEMENT si HTTPS est configuré ────────────
# add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# ── Content Security Policy ───────────────────────────────────────
add_header Content-Security-Policy "
  default-src 'self';
  frame-src 'self' *.twitter.com *.youtube.com *.vimeo.com;
  font-src data: 'self' *.gstatic.com *.googleapis.com *.cloudflare.com;
  img-src 'self' data: *.cloudflare.com *.vimeo.com *.youtube.com *.photobucket.com *.flickr.com;
  media-src 'self' *.photobucket.com *.vimeo.com *.youtube.com;
  object-src 'none';
  script-src 'self' *.twitter.com *.google.com ajax.googleapis.com *.cloudflare.com www.google-analytics.com *.twimg.com 'unsafe-inline' 'unsafe-eval';
  style-src 'self' 'unsafe-inline' *.googleapis.com;
  connect-src 'self';
" always;

# ── CORS ─────────────────────────────────────────────────────────
# Désactivé par défaut — n'expose pas l'API REST WP au monde entier.
# Pour activer sur un domaine précis, remplacer par :
#   add_header Access-Control-Allow-Origin  "https://exemple.com" always;
#   add_header Access-Control-Allow-Methods "GET, POST, OPTIONS"  always;
#   add_header Vary                         "Origin"               always;