# ── Rate limiting ─────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=wp_login:10m rate=5r/m;

server {
    listen 80;
    server_name _;
    root /var/www/html;
    index index.php;

    # Masque la version Nginx dans les réponses d'erreur
    server_tokens off;    client_max_body_size 64m;
    # ── Headers sécurité — chargés ici (server block) ─────────────
    include /etc/nginx/conf.d/headers.conf;

    # ── IP réelle derrière le proxy ───────────────────────────────
    set_real_ip_from  172.16.0.0/12;
    real_ip_header    X-Forwarded-For;

    # ── W3 Total Cache ────────────────────────────────────────────
    set $w3tc_rewrite 1;
    if ($request_method = POST)         { set $w3tc_rewrite 0; }
    if ($query_string != "")            { set $w3tc_rewrite 0; }
    if ($http_cookie ~* "(wordpress_logged_in|wp-postpass|woocommerce_|comment_author)") {
        set $w3tc_rewrite 0;
    }

    location / {
        include /etc/nginx/conf.d/headers.conf;   # réinclus — sinon héritage perdu
        try_files
            /wp-content/cache/page_enhanced/${host}${uri}/_index.html
            /wp-content/cache/page_enhanced/${host}${uri}/_index.xml
            $uri
            $uri/
            /index.php?$args;
    }

    # ── PHP-FPM ───────────────────────────────────────────────────
    location ~ \.php$ {
        include /etc/nginx/conf.d/headers.conf;   # réinclus

        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;

        fastcgi_pass wordpress:9000;
        fastcgi_index index.php;
        include fastcgi_params;

        fastcgi_param SCRIPT_FILENAME        $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO              $fastcgi_path_info;
        fastcgi_param SERVER_NAME            $host;
        fastcgi_param HTTP_X_REAL_IP         $remote_addr;
        fastcgi_param HTTP_X_FORWARDED_FOR   $proxy_add_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_HOST  $host;
        fastcgi_param HTTP_X_FORWARDED_PROTO $scheme;

        fastcgi_buffers      16 16k;
        fastcgi_buffer_size  32k;
        fastcgi_read_timeout 60;
    }

    # ── Fichiers statiques ────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|webp|ico|svg|woff|woff2|ttf|eot|otf)$ {
        # Headers sécurité réinclus + cache long terme pour statiques
        include /etc/nginx/conf.d/headers.conf;
        add_header Cache-Control "public, max-age=31536000, immutable" always;

        expires     max;
        access_log  off;
        log_not_found off;
    }

    # ── Sécurité ──────────────────────────────────────────────────    # Bloquer l'énumération des auteurs
    if ($query_string ~ "author=[0-9]+") { return 403; }

    location = /wp-login.php {
        include /etc/nginx/conf.d/headers.conf;
        limit_req  zone=wp_login burst=3 nodelay;
        try_files  $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass  wordpress:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param SERVER_NAME     $host;
    }
    location ~ /\.ht           { deny all; }
    location ~ /\.git          { deny all; }
    location = /xmlrpc.php     { deny all; }
    location = /wp-config.php  { deny all; }
    location = /favicon.ico    { log_not_found off; access_log off; }
    location = /robots.txt     { allow all; log_not_found off; access_log off; }

    # ── Gzip ──────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_proxied    any;
    gzip_types      text/plain text/css text/xml text/javascript
                    application/json application/javascript
                    application/xml+rss image/svg+xml;
}