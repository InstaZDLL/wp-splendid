<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240" role="img" aria-label="WordPress Splendid logo">
  <title>WordPress Splendid</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#21759B"/>
      <stop offset="100%" stop-color="#16344B"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Card background -->
  <rect width="240" height="240" rx="48" fill="url(#bg)"/>

  <!-- Subtle inner ring -->
  <rect x="14" y="14" width="212" height="212" rx="38"
        fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>

  <!-- Stylized "W" mark -->
  <path d="M 52 72 L 80 170 L 108 108 L 132 170 L 160 72"
        fill="none" stroke="#ffffff" stroke-width="18"
        stroke-linecap="round" stroke-linejoin="round"
        filter="url(#shadow)"/>

  <!-- Accent dot (Redis-red — represents the cache layer / dot of "Splendid") -->
  <circle cx="184" cy="64" r="13" fill="#DC382D"/>
  <circle cx="184" cy="64" r="13" fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-width="2"/>
</svg>
